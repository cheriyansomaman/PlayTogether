version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: playtogether-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: playtogether
      POSTGRES_USER: playtogether
      POSTGRES_PASSWORD: playtogether
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playtogether -d playtogether"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
